name: Kubevirt RPM Link Validator

on:
  workflow_dispatch:
  schedule:
    - cron: "0 3 * * 1"

permissions: {}

jobs:
  validate-and-fix-rpm-links:
    permissions:
      contents: write
      pull-requests: write
    runs-on: ubuntu-24.04
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@fa2e9d605c4eeb9fcad4c99c224cee0c6c7f3594 # v2.16.0
        with:
          egress-policy: audit

      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false

      - name: Validate and repair CentOS 9 x86_64 RPM links
        shell: bash
        run: |
          python3 .github/scripts/validate_rpm_links.py --root .

      - name: Detect changes
        id: changes
        shell: bash
        run: |
          if git diff --quiet; then
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
          else
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Create pull request with RPM URL fixes
        if: steps.changes.outputs.has_changes == 'true'
        uses: peter-evans/create-pull-request@22a9089034f40e5a961c8808d113e2c98fb63676 # v7
        with:
          branch: automation/kubevirt-rpm-link-fixes
          commit-message: "chore(kubevirt-patch): repair CentOS 9 x86_64 rpm links"
          title: "chore(kubevirt-patch): repair CentOS 9 x86_64 rpm links"
          body: |
            This automated PR validates and repairs broken CentOS 9 x86_64 RPM URLs in:
            - `kubevirt-patch/*/WORKSPACE`
            - `kubevirt-patch/*/rpm-BUILD.bazel`

            Repair order:
            1. Keep existing URL if reachable.
            2. Fall back to `https://storage.googleapis.com/builddeps/<SHA256SUM>`.
            3. If still missing, find the latest RPM in CentOS Stream 9 BaseOS/AppStream and update both files.

            Scope is intentionally limited to CentOS 9 and x86_64 entries.
          labels: |
            dependencies
            automation
